<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Интеллект Х</title>
  <style>
    :root {
      --bg: #000000;
      --cold: #d8e8ff;
      --cold-soft: rgba(190, 220, 255, 0.35);
      --cold-glow: rgba(130, 185, 255, 0.75);
      --formula: rgba(210, 225, 255, 0.09);
      --formula-bright: rgba(225, 235, 255, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      position: relative;
      background:
        radial-gradient(circle at 50% 58%, rgba(28, 52, 90, 0.18) 0%, rgba(0,0,0,0) 28%),
        radial-gradient(circle at 50% 72%, rgba(60, 110, 190, 0.08) 0%, rgba(0,0,0,0) 24%),
        #000;
    }

    #scene {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* Звёзды */
    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      opacity: 0.18;
      box-shadow: 0 0 6px rgba(255,255,255,0.25);
      animation: twinkle linear infinite;
      pointer-events: none;
    }

    @keyframes twinkle {
      0%, 100% {
        opacity: 0.12;
        transform: scale(0.85);
      }
      50% {
        opacity: 0.95;
        transform: scale(1.18);
      }
    }

    /* Формулы */
    .formula {
      position: absolute;
      color: var(--formula);
      font-family: "Times New Roman", Georgia, serif;
      letter-spacing: 0.02em;
      white-space: nowrap;
      user-select: none;
      pointer-events: none;
      text-shadow: 0 0 10px rgba(180, 210, 255, 0.03);
      animation: formulaPulse ease-in-out infinite;
    }

    @keyframes formulaPulse {
      0%, 100% {
        opacity: 0.22;
        filter: blur(0.2px);
      }
      50% {
        opacity: 0.5;
        filter: blur(0px);
      }
    }

    /* Центральный заголовок */
    .title-wrap {
      position: absolute;
      left: 50%;
      top: 42%;
      transform: translate(-50%, -50%);
      z-index: 20;
      text-align: center;
      pointer-events: none;
    }

    .title {
      font-weight: 300;
      font-size: clamp(42px, 5vw, 96px);
      letter-spacing: 0.08em;
      color: rgba(235, 242, 255, 0.84);
      text-shadow:
        0 0 12px rgba(180, 210, 255, 0.08),
        0 0 24px rgba(140, 180, 255, 0.05);
    }

    .title .x {
      color: #f4fbff;
      text-shadow:
        0 0 10px rgba(255,255,255,0.85),
        0 0 22px rgba(180, 220, 255, 0.72),
        0 0 44px rgba(110, 170, 255, 0.5),
        0 0 80px rgba(110, 170, 255, 0.25);
      animation: xPulse 2.6s ease-in-out infinite;
    }

    @keyframes xPulse {
      0%, 100% {
        opacity: 0.92;
      }
      50% {
        opacity: 1;
      }
    }

    /* Световой вертикальный след под X */
    .x-beam {
      position: absolute;
      left: 50%;
      top: calc(100% + 10px);
      transform: translateX(170px);
      width: 26px;
      height: 280px;
      background:
        linear-gradient(to bottom,
          rgba(230,245,255,0.95) 0%,
          rgba(150,205,255,0.65) 15%,
          rgba(120,180,255,0.22) 45%,
          rgba(90,140,255,0.08) 72%,
          rgba(0,0,0,0) 100%);
      filter: blur(5px);
      opacity: 0.72;
      z-index: 18;
      pointer-events: none;
      animation: beamPulse 2.2s ease-in-out infinite;
    }

    .x-beam::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 0;
      width: 70px;
      height: 100%;
      transform: translateX(-50%);
      background:
        linear-gradient(to bottom,
          rgba(180,220,255,0.28),
          rgba(80,130,255,0.08),
          rgba(0,0,0,0));
      filter: blur(18px);
    }

    @keyframes beamPulse {
      0%, 100% {
        opacity: 0.52;
        transform: translateX(170px) scaleY(0.95);
      }
      50% {
        opacity: 0.88;
        transform: translateX(170px) scaleY(1.04);
      }
    }

    /* Ракета */
    .rocket-stage {
      position: absolute;
      left: 50%;
      bottom: -2vh;
      width: min(42vw, 430px);
      transform: translateX(-50%);
      z-index: 30;
      will-change: transform, filter, opacity;
      animation: rocketLaunch 9.5s cubic-bezier(.22,.7,.18,1) infinite;
    }

    @keyframes rocketLaunch {
      0% {
        transform: translateX(-50%) translateY(0) scale(1);
        filter: brightness(0.98);
      }
      8% {
        transform: translateX(-50%) translateY(-6px) scale(1);
      }
      14% {
        transform: translateX(-50%) translateY(-18px) scale(1.003);
      }
      24% {
        transform: translateX(-50%) translateY(-70px) scale(1.01);
      }
      38% {
        transform: translateX(-50%) translateY(-220px) scale(0.97);
      }
      52% {
        transform: translateX(-50%) translateY(-440px) scale(0.88);
      }
      68% {
        transform: translateX(-50%) translateY(-760px) scale(0.72);
      }
      82% {
        transform: translateX(-50%) translateY(-1120px) scale(0.52);
        opacity: 1;
      }
      100% {
        transform: translateX(-50%) translateY(-1450px) scale(0.34);
        opacity: 0;
      }
    }

    .rocket-wrap {
      position: relative;
      width: 100%;
    }

    .rocket-img {
      display: block;
      width: 100%;
      height: auto;
      filter:
        drop-shadow(0 0 18px rgba(255, 210, 130, 0.08))
        drop-shadow(0 0 32px rgba(255, 255, 255, 0.04));
      user-select: none;
      -webkit-user-drag: none;
    }

    /* Светящаяся X на носу ракеты */
    .rocket-x {
      position: absolute;
      left: 50.3%;
      top: 15.6%;
      transform: translate(-50%, -50%);
      color: #f6fbff;
      font-size: clamp(14px, 1.6vw, 22px);
      font-weight: 300;
      letter-spacing: 0.04em;
      text-shadow:
        0 0 6px rgba(255,255,255,0.9),
        0 0 14px rgba(180,220,255,0.8),
        0 0 30px rgba(110,170,255,0.5);
      z-index: 4;
      animation: rocketXPulse 1.8s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes rocketXPulse {
      0%, 100% { opacity: 0.78; }
      50% { opacity: 1; }
    }

    /* Факел двигателя */
    .engine-flame {
      position: absolute;
      left: 50%;
      bottom: 8%;
      transform: translateX(-50%);
      width: 23%;
      height: 28%;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 10%, rgba(255,255,255,0.98) 0 18%, rgba(255,255,255,0) 32%),
        linear-gradient(to bottom,
          rgba(255,255,255,0.98) 0%,
          rgba(255,235,185,0.95) 14%,
          rgba(255,192,88,0.94) 36%,
          rgba(255,120,20,0.78) 62%,
          rgba(255,80,0,0.42) 82%,
          rgba(0,0,0,0) 100%);
      filter: blur(6px);
      clip-path: polygon(36% 0%, 64% 0%, 84% 28%, 72% 100%, 28% 100%, 16% 28%);
      animation: flameFlicker 0.11s ease-in-out infinite;
    }

    .engine-flame::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom,
          rgba(255,255,255,0.9),
          rgba(140,210,255,0.22),
          rgba(0,0,0,0));
      filter: blur(16px);
      transform: scale(1.6, 1.15);
      opacity: 0.42;
    }

    @keyframes flameFlicker {
      0% {
        transform: translateX(-50%) scaleY(0.92) scaleX(0.96);
        opacity: 0.82;
      }
      50% {
        transform: translateX(-50%) scaleY(1.08) scaleX(1.05);
        opacity: 1;
      }
      100% {
        transform: translateX(-50%) scaleY(0.96) scaleX(0.98);
        opacity: 0.9;
      }
    }

    /* Дым */
    .smoke-field {
      position: absolute;
      left: 50%;
      bottom: -6vh;
      width: min(82vw, 980px);
      height: 36vh;
      transform: translateX(-50%);
      z-index: 14;
      pointer-events: none;
      animation: smokeFade 9.5s linear infinite;
    }

    @keyframes smokeFade {
      0% { opacity: 1; }
      45% { opacity: 1; }
      70% { opacity: 0.65; }
      100% { opacity: 0; }
    }

    .smoke {
      position: absolute;
      bottom: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%,
          rgba(255, 212, 146, 0.88) 0%,
          rgba(255, 166, 70, 0.58) 24%,
          rgba(135, 90, 52, 0.26) 58%,
          rgba(0,0,0,0) 74%);
      filter: blur(14px);
      animation: smokeLift ease-out infinite;
      mix-blend-mode: screen;
    }

    @keyframes smokeLift {
      0% {
        transform: translateY(0) scale(0.9);
        opacity: 0;
      }
      12% {
        opacity: 0.95;
      }
      100% {
        transform: translateY(-120px) scale(1.45);
        opacity: 0;
      }
    }

    /* Мягкий нижний жар */
    .launch-glow {
      position: absolute;
      left: 50%;
      bottom: -4vh;
      width: min(60vw, 760px);
      height: 26vh;
      transform: translateX(-50%);
      background:
        radial-gradient(circle at 50% 60%,
          rgba(255, 212, 144, 0.48) 0%,
          rgba(255, 140, 40, 0.24) 28%,
          rgba(0,0,0,0) 70%);
      filter: blur(26px);
      z-index: 12;
      pointer-events: none;
      animation: launchPulse 0.16s ease-in-out infinite;
    }

    @keyframes launchPulse {
      0%, 100% { opacity: 0.65; transform: translateX(-50%) scale(0.98); }
      50% { opacity: 1; transform: translateX(-50%) scale(1.05); }
    }

    @media (max-width: 900px) {
      .rocket-stage {
        width: min(62vw, 360px);
      }

      .x-beam {
        transform: translateX(112px);
        height: 220px;
      }
    }
  </style>
</head>
<body>
  <div id="scene"></div>

  <div class="title-wrap">
    <div class="title">Интеллект <span class="x">Х</span></div>
    <div class="x-beam"></div>
  </div>

  <div class="launch-glow"></div>

  <div class="smoke-field" id="smokeField"></div>

  <div class="rocket-stage">
    <div class="rocket-wrap">
      <div class="engine-flame"></div>
      <img src="Buran.png" alt="Буран" class="rocket-img">
      <div class="rocket-x">Х</div>
    </div>
  </div>

  <script>
    const scene = document.getElementById("scene");
    const smokeField = document.getElementById("smokeField");

    // Звёзды
    function createStars() {
      const count = 150;
      for (let i = 0; i < count; i++) {
        const s = document.createElement("div");
        s.className = "star";
        const size = Math.random() * 2 + 0.7;
        s.style.width = size + "px";
        s.style.height = size + "px";
        s.style.left = Math.random() * 100 + "%";
        s.style.top = Math.random() * 100 + "%";
        s.style.animationDuration = (1.8 + Math.random() * 3.4) + "s";
        s.style.animationDelay = (Math.random() * 3.5) + "s";
        scene.appendChild(s);
      }
    }

    // Формулы / символы / код
    function createFormulas() {
      const formulas = [
        "∑ᵢ wᵢxᵢ → min L(θ)",
        "∂ℒ/∂θ = η · ∇f(x)",
        "P(x|y) ∝ P(y|x)P(x)",
        "while(true){ learn(); }",
        "f(x)=σ(Wx+b)",
        "∫ e^{-x²} dx",
        "E = mc²",
        "λ = h / p",
        "y = αx + β",
        "argmax P(token|context)",
        "∇·F = ρ/ε₀",
        "A = {c(x) | f(y)}",
        "loss(x,y;w)",
        "θₜ₊₁ = θₜ - η∇J(θ)",
        "if (truth) return light;",
        "X ∈ ℋ",
        "Σ pᵢ log pᵢ",
        "∀x ∃y : x<y",
        "Neural Graph G(V,E)",
        "class Mind extends System {}",
        "φ = (1 + √5)/2",
        "Ψ(x,t)",
        "lim x→∞",
        "P ≠ NP ?",
        "attention(Q,K,V)",
        "hₜ = tanh(Wx + Uhₜ₋₁)",
        "cosmos :: intellect",
        "β̂ = (XᵀX)⁻¹Xᵀy"
      ];

      const count = 34;
      for (let i = 0; i < count; i++) {
        const f = document.createElement("div");
        f.className = "formula";
        f.textContent = formulas[Math.floor(Math.random() * formulas.length)];
        f.style.left = (Math.random() * 92) + "%";
        f.style.top = (Math.random() * 86) + "%";
        f.style.fontSize = (12 + Math.random() * 26) + "px";
        f.style.opacity = (0.08 + Math.random() * 0.15).toFixed(2);
        f.style.animationDuration = (3 + Math.random() * 6) + "s";
        f.style.animationDelay = (Math.random() * 5) + "s";
        if (Math.random() > 0.72) {
          f.style.color = "rgba(220,235,255,0.16)";
        }
        scene.appendChild(f);
      }
    }

    // Дым
    function createSmoke() {
      const count = 24;
      for (let i = 0; i < count; i++) {
        const p = document.createElement("div");
        p.className = "smoke";
        const size = 80 + Math.random() * 220;
        p.style.width = size + "px";
        p.style.height = size * (0.72 + Math.random() * 0.22) + "px";
        p.style.left = (Math.random() * 100) + "%";
        p.style.animationDuration = (2.4 + Math.random() * 2.8) + "s";
        p.style.animationDelay = (Math.random() * 1.4) + "s";
        smokeField.appendChild(p);
      }
    }

    createStars();
    createFormulas();
    createSmoke();
  </script>
</body>
</html>
